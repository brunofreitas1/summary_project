<!doctype html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summary</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div id="page">
    <section id="result">
      <div id="card">
        <h1>Your Result</h1>
        <div id="score">
          <h1 id="score-calculated">76</h1>
          <h2>of 100</h2>
        </div>

        <div id="feedback">
          <h1>Great</h1>
          <h2>
            You scored higher than 65% of the people who have taken these
            tests.
          </h2>
        </div>
      </div>
    </section>

    <section id="summary">
      <div id="card-summary">
        <h2>Summary</h2>

        <div class="summary-items">
          <div class="item-container" id="item-reaction">
            <div class="item-info">
              <img src="./assets/reaction.svg" alt="Ícone de Reação" />
              <span class="span-text" id="span-reaction">Reaction</span>
            </div>
            <input type="number" id="input-reaction" class="item-score" min="0" max="100">/ 100</input>
          </div>

          <div class="item-container" id="item-memory">
            <div class="item-info">
              <img src="./assets/memory.svg" />
              <span class="span-text" id="spam-memory">Memory</span>
            </div>
            <input type="number" id="input-memory" class="item-score" min="0" max="100">/ 100</input>
          </div>

          <div class="item-container" id="item-verbal">
            <div class="item-info">
              <img src="./assets/verbal.svg" />
              <span class="span-text" id="spam-verbal">Verbal</span>
            </div>
            <input type="number" id="input-verbal" class="item-score" min="0" max="100">/ 100</input>
          </div>

          <div class="item-container" id="item-visual">
            <div class="item-info">
              <img src="./assets/visual.svg" />
              <span class="span-text" id="spam-visual">Visual</span>
            </div>
            <input type="number" id="input-visual" class="item-score" min="0" max="100">/ 100</input>
          </div>
        </div>

        <div id="continue-button">
          <a>Continue</a>
        </div>
      </div>
    </section>
  </div>

  <script src="scripts.js"></script>

</body>

</html>
